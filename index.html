<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>Gofile - Folder View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Mencegah highlight biru saat elemen diklik pada perangkat mobile */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200 min-h-screen flex flex-col items-center p-3 sm:p-6">

    <!-- Area Iklan Atas -->
    <div class="w-full max-w-3xl flex justify-center mb-4 overflow-hidden">
        <script>
            atOptions = {
                'key' : '64e783bd557c30cbf66293b5c5fda05f',
                'format' : 'iframe',
                'height' : 90,
                'width' : 728,
                'params' : {}
            };
        </script>
        <script src="https://braverybreezebinding.com/64e783bd557c30cbf66293b5c5fda05f/invoke.js"></script>
    </div>

    <!-- Kontainer Utama Gofile -->
    <div class="max-w-3xl w-full bg-[#111827] rounded-2xl p-4 sm:p-6 shadow-2xl border border-gray-800/80 overflow-hidden">
        
        <!-- Header Folder -->
        <div class="border-b border-gray-800/80 pb-5 mb-4">
            <div class="flex items-start gap-4">
                <span class="text-4xl text-yellow-500 flex-shrink-0"><i class="fa-solid fa-folder shadow-sm"></i></span>
                <div class="min-w-0 flex-1">
                    <h2 id="folder-title-display" class="text-base sm:text-lg font-bold text-gray-100 tracking-wide truncate">Memuat info folder...</h2>
                    <p id="folder-date" class="text-[11px] text-gray-500 mt-1">Menghubungkan ke database...</p>
                    <div class="flex flex-wrap gap-2 mt-3">
                        <span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-md border border-emerald-500/20 flex items-center gap-1.5 font-medium">
                            <i class="fa-solid fa-earth-asia text-[9px]"></i> public
                        </span>
                        <span id="file-count" class="text-[10px] bg-gray-800/80 text-gray-300 px-2.5 py-1 rounded-md border border-gray-700/50 font-medium">
                            0 items
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Daftar Berkas (Feed) -->
        <div id="files-feed-container" class="space-y-0 divide-y divide-gray-800/50">
            <div class="text-center py-16 text-xs text-yellow-500 animate-pulse">
                <i class="fa-solid fa-spinner fa-spin mr-2 text-sm"></i> Memuat isi berkas Gofile...
            </div>
        </div>

        <!-- Footer Kontainer -->
        <div class="mt-8 pt-5 border-t border-gray-800/80 text-center text-[11px] text-gray-500 tracking-wider">
            Showing 1000 items per page • Total <span id="total-items-footer" class="text-gray-300 font-semibold">0</span> items
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const videoSlug = urlParams.get('v'); 

        const folderTitleDisplay = document.getElementById('folder-title-display');
        const folderDate = document.getElementById('folder-date');
        const filesFeedContainer = document.getElementById('files-feed-container');
        const fileCountSpan = document.getElementById('file-count');
        const totalItemsFooter = document.getElementById('total-items-footer');

        let videoUrlsCache = {};
        const DOWNLOAD_REDIRECT_URL = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";

        async function loadGofileFeed() {
            if (!videoSlug) {
                folderTitleDisplay.textContent = "Error: Link Tidak Valid";
                filesFeedContainer.innerHTML = `<p class="text-red-400 text-xs text-center py-8">Parameter token slug (v) hilang.</p>`;
                return;
            }

            try {
                const { data: packageData, error: packageError } = await supabaseClient
                    .from('video_packages')
                    .select('*')
                    .eq('slug', videoSlug)
                    .single();

                if (packageError || !packageData) {
                    folderTitleDisplay.textContent = "Folder Not Found";
                    filesFeedContainer.innerHTML = `<p class="text-red-400 text-xs text-center py-8">Sistem tidak menemukan folder tersebut.</p>`;
                    return;
                }

                folderTitleDisplay.textContent = packageData.title;
                if (packageData.created_at) {
                    const tanggal = new Date(packageData.created_at);
                    folderDate.textContent = `${tanggal.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}, ${tanggal.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}`;
                }

                const { data: itemsData, error: itemsError } = await supabaseClient
                    .from('video_items')
                    .select('*')
                    .eq('package_id', packageData.id);

                if (itemsError || !itemsData || itemsData.length === 0) {
                    filesFeedContainer.innerHTML = `<p class="text-gray-500 text-xs text-center py-12">Folder kosong (Belum ada file diunggah).</p>`;
                    return;
                }

                const totalFiles = itemsData.length;
                fileCountSpan.textContent = `Total ${totalFiles} items`;
                totalItemsFooter.textContent = totalFiles;
                filesFeedContainer.innerHTML = "";

                itemsData.forEach((item, index) => {
                    const fullUrl = item.video_url;
                    videoUrlsCache[item.id] = fullUrl; 
                    
                    let fileName = fullUrl.split('/').pop().split('?')[0] || `Video_File_${index + 1}.mp4`;
                    if (fullUrl.includes('youtube.com') || fullUrl.includes('youtu.be')) {
                        fileName = `YouTube_Stream_Part_${index + 1}.mp4`;
                    }

                    const fakeSize = ((index + 2) * 21.4).toFixed(1) + " MB";
                    const fakeDownloads = Math.floor(Math.random() * (50000 - 1000 + 1)) + 1000;

                    const card = document.createElement('div');
                    card.className = "py-4 flex flex-col gap-3";

                    card.innerHTML = `
                        <!-- Info Judul dan Metadata Berkas -->
                        <div class="w-full pl-7">
                            <h3 class="text-xs sm:text-[13px] font-semibold text-gray-100 tracking-wide break-all leading-relaxed">${fileName}</h3>
                            <p class="text-[10px] text-gray-500 mt-1 font-medium">${fakeSize} • ${fakeDownloads.toLocaleString('id-ID')} downloads</p>
                        </div>

                        <!-- Baris Kontrol Utama -->
                        <div class="flex items-center justify-between w-full gap-3">
                            <!-- Sisi Kiri: Selektor Checkbox & Ikon Tipe File -->
                            <div class="flex items-center gap-2.5 flex-shrink-0">
                                <input type="checkbox" class="w-4 h-4 rounded bg-gray-900 border-gray-700 text-blue-600 focus:ring-0 focus:ring-offset-0 cursor-pointer accent-blue-600">
                                <span class="text-blue-500 text-lg flex items-center justify-center"><i class="fa-solid fa-file-video"></i></span>
                            </div>

                            <!-- Sisi Tengah: Thumbnail / Viewport Mini -->
                            <div id="mini-viewport-${item.id}" onclick="handleThumbnailClick(event, '${item.id}', '${fileName}')" class="w-[100px] h-[75px] sm:w-[110px] sm:h-[80px] rounded-lg bg-black border border-gray-800/80 flex items-center justify-center relative overflow-hidden mx-auto cursor-pointer hover:border-gray-700 transition-all duration-200 group" style="display: block;">
                                ${renderThumbnailPlayer(fullUrl)}
                                <!-- Hover Overlay untuk mempercantik klik play -->
                                <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-150">
                                    <i class="fa-solid fa-play text-white text-xs"></i>
                                </div>
                            </div>

                            <!-- Sisi Kanan: Tombol Aksi Kanan -->
                            <div class="flex items-center gap-1.5 flex-shrink-0">
                                <button type="button" id="play-btn-${item.id}" onclick="handleButtonClick(event, '${item.id}', '${fileName}')" class="w-8 h-8 rounded-lg bg-gray-800/80 hover:bg-gray-700 active:scale-95 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs transition-all" title="Play Video">
                                    <i class="fa-solid fa-play"></i>
                                </button>
                                <a href="${DOWNLOAD_REDIRECT_URL}" target="_blank" class="w-8 h-8 rounded-lg bg-gray-800/80 hover:bg-gray-700 active:scale-95 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs transition-all" title="Download">
                                    <i class="fa-solid fa-download"></i>
                                </a>
                                <button type="button" class="w-8 h-8 rounded-lg bg-gray-800/80 hover:bg-gray-700 active:scale-95 text-gray-400 border border-gray-700/80 flex items-center justify-center text-xs transition-all">
                                    <i class="fa-solid fa-ellipsis-vertical"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Panel Player Besar saat di-expand -->
                        <div id="expanded-zone-${item.id}" class="w-full hidden mt-2 bg-black rounded-xl border border-gray-800 overflow-hidden aspect-video shadow-inner"></div>
                    `;

                    filesFeedContainer.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                folderTitleDisplay.textContent = "Error Jaringan";
            }
        }

        function renderThumbnailPlayer(url) {
            if (url.match(/\.(mp4|webm|ogg)/i) || url.includes('supabase.co/storage')) {
                return `<video preload="metadata" muted playsinline class="w-full h-full object-cover pointer-events-none"><source src="${url}" type="video/mp4"></video>`;
            } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let embedUrl = url;
                if(embedUrl.includes('watch?v=')) embedUrl = embedUrl.replace('watch?v=', 'embed/');
                if(embedUrl.includes('youtu.be/')) embedUrl = embedUrl.replace('youtu.be/', 'youtube.com/embed/');
                return `<iframe src="${embedUrl}" class="w-full h-full pointer-events-none opacity-60" frameborder="0"></iframe>`;
            } else {
                return `<i class="fa-solid fa-video text-gray-700 text-lg"></i>`;
            }
        }

        function handleThumbnailClick(e, id, title) {
            e.preventDefault();
            e.stopPropagation();
            const btn = document.getElementById(`play-btn-${id}`);
            if (!btn.classList.contains('activePlaying')) {
                playVideo(id, title);
            }
        }

        function handleButtonClick(e, id, title) {
            e.stopPropagation(); 
            const btn = document.getElementById(`play-btn-${id}`);
            
            if (btn.classList.contains('activePlaying')) {
                closeVideo(id);
            } else {
                e.preventDefault(); 
                playVideo(id, title);
            }
        }

        function playVideo(id, title) {
            const btn = document.getElementById(`play-btn-${id}`);
            const miniBox = document.getElementById(`mini-viewport-${id}`);
            const bigPlayerZone = document.getElementById(`expanded-zone-${id}`);
            const fileUrl = videoUrlsCache[id];

            btn.classList.add('activePlaying');
            btn.innerHTML = `<i class="fa-solid fa-xmark"></i>`; 
            btn.className = "w-8 h-8 rounded-lg bg-red-600 hover:bg-red-500 text-white border border-red-500/50 flex items-center justify-center text-xs transition-all active:scale-95";

            miniBox.style.setProperty('display', 'none', 'important'); 
            bigPlayerZone.classList.remove('hidden'); 

            if (fileUrl.match(/\.(mp4|webm|ogg)/i) || fileUrl.includes('supabase.co/storage')) {
                bigPlayerZone.innerHTML = `<video controls autoplay playsinline class="w-full h-full object-contain"><source src="${fileUrl}" type="video/mp4"></video>`;
            } else if (fileUrl.includes('youtube.com') || fileUrl.includes('youtu.be')) {
                let embed = fileUrl;
                if(embed.includes('watch?v=')) embed = embed.replace('watch?v=', 'embed/');
                if(embed.includes('youtu.be/')) embed = embed.replace('youtu.be/', 'youtube.com/embed/');
                embed += embed.includes('?') ? "&autoplay=1" : "?autoplay=1";
                bigPlayerZone.innerHTML = `<iframe src="${embed}" class="w-full h-full" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
            } else {
                bigPlayerZone.innerHTML = `
                    <div class="w-full h-full flex flex-col items-center justify-center bg-gray-900 p-4 rounded-xl">
                        <p class="text-[11px] text-gray-400 mb-3 text-center px-4 line-clamp-2">${title}</p>
                        <a href="${fileUrl}" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] py-1.5 px-4 rounded-md font-bold tracking-wide active:scale-95 transition-all">Buka Sumber</a>
                    </div>`;
            }
        }

        function closeVideo(id) {
            const btn = document.getElementById(`play-btn-${id}`);
            const miniBox = document.getElementById(`mini-viewport-${id}`);
            const bigPlayerZone = document.getElementById(`expanded-zone-${id}`);

            btn.classList.remove('activePlaying');
            btn.innerHTML = `<i class="fa-solid fa-play"></i>`; 
            btn.className = "w-8 h-8 rounded-lg bg-gray-800/80 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs transition-all active:scale-95 hover:bg-gray-700";

            bigPlayerZone.innerHTML = ""; 
            bigPlayerZone.classList.add('hidden'); 
            
            miniBox.style.setProperty('display', 'block', 'important'); 
        }

        loadGofileFeed();
    </script>
</body>
</html>
