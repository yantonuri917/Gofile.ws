<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>Gofile - フォルダ表示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Gofile風のフェードアウトアニメーション */
        .fade-out {
            opacity: 0;
            transition: opacity 0.3s ease-out;
            pointer-events: none;
        }
        /* スピナー自体の超高速・滑らかな回転 */
        .gofile-spinner {
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200 min-h-screen flex flex-col items-center p-3 sm:p-6">

    <!-- 🌐 【Gofile仕様】全画面ローディングスピナー画面 -->
    <div id="page-loading-overlay" class="fixed inset-0 bg-[#0e1420] z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="flex flex-col items-center">
            <!-- GofileスタイルのカスタムSVGスピナー -->
            <svg class="gofile-spinner w-12 h-12 text-white" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                <path class="opacity-80" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-white text-[13px] font-medium tracking-wide mt-5 opacity-90">Loading...</p>
        </div>
    </div>

    <!-- バナー広告コンテナ -->
    <div id="banner-ad-container" class="w-full flex justify-center my-3 min-h-[90px]"></div>

    <div class="max-w-3xl w-full bg-[#111827] rounded-xl p-4 sm:p-5 shadow-2xl border border-gray-800/80 mt-2 overflow-hidden">
        
        <div class="border-b border-gray-800 pb-4 mb-4">
            <div class="flex items-start gap-3">
                <span class="text-3xl text-yellow-500 mt-1"><i class="fa-solid fa-folder"></i></span>
                <div class="min-w-0 flex-1">
                    <h2 id="folder-title-display" class="text-base font-bold text-gray-100 tracking-wide truncate">フォルダ情報を読み込み中...</h2>
                    <p id="folder-date" class="text-[11px] text-gray-500 mt-0.5">接続中...</p>
                    <div class="flex gap-2 mt-2">
                        <span class="text-[10px] bg-gray-800/80 text-emerald-400 px-2 py-0.5 rounded border border-gray-700/50 flex items-center gap-1">
                            <i class="fa-solid fa-earth-asia text-[9px]"></i> 公開
                        </span>
                        <span id="file-count" class="text-[10px] bg-gray-800/80 text-gray-400 px-2 py-0.5 rounded border border-gray-700/50">
                            0 個のアイテム
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div id="files-feed-container" class="space-y-0 divide-y divide-gray-800/70">
            <div class="text-center py-12 text-xs text-yellow-500 animate-pulse">
                <i class="fa-solid fa-spinner fa-spin mr-1"></i> Gofileのファイルを読み込んでいます...
            </div>
        </div>

        <div class="mt-8 pt-4 border-t border-gray-800 text-center text-[10px] text-gray-600 tracking-wide">
            ページあたり 1000 件表示中 • 合計 <span id="total-items-footer">0</span> 件のアイテム
        </div>
    </div>
