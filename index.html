<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>Gofile - フォルダ表示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Gofile風のフェードアウトアニメーション */
        .fade-out {
            opacity: 0;
            transition: opacity 0.3s ease-out;
            pointer-events: none;
        }
        /* スピナー自体の超高速・滑らかな回転 */
        .gofile-spinner {
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200 min-h-screen flex flex-col items-center p-3 sm:p-6">

    <!-- 🌐 【Gofile仕様】全画面ローディングスピナー画面 -->
    <div id="page-loading-overlay" class="fixed inset-0 bg-[#0e1420] z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="flex flex-col items-center">
            <!-- GofileスタイルのカスタムSVGスピナー -->
            <svg class="gofile-spinner w-12 h-12 text-white" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                <path class="opacity-80" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-white text-[13px] font-medium tracking-wide mt-5 opacity-90">Loading...</p>
        </div>
    </div>

    <!-- バナー広告コンテナ -->
    <div id="banner-ad-container" class="w-full flex justify-center my-3 min-h-[90px]"></div>

    <div class="max-w-3xl w-full bg-[#111827] rounded-xl p-4 sm:p-5 shadow-2xl border border-gray-800/80 mt-2 overflow-hidden">
        
        <div class="border-b border-gray-800 pb-4 mb-4">
            <div class="flex items-start gap-3">
                <span class="text-3xl text-yellow-500 mt-1"><i class="fa-solid fa-folder"></i></span>
                <div class="min-w-0 flex-1">
                    <h2 id="folder-title-display" class="text-base font-bold text-gray-100 tracking-wide truncate">フォルダ情報を読み込み中...</h2>
                    <p id="folder-date" class="text-[11px] text-gray-500 mt-0.5">接続中...</p>
                    <div class="flex gap-2 mt-2">
                        <span class="text-[10px] bg-gray-800/80 text-emerald-400 px-2 py-0.5 rounded border border-gray-700/50 flex items-center gap-1">
                            <i class="fa-solid fa-earth-asia text-[9px]"></i> 公開
                        </span>
                        <span id="file-count" class="text-[10px] bg-gray-800/80 text-gray-400 px-2 py-0.5 rounded border border-gray-700/50">
                            0 個のアイテム
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div id="files-feed-container" class="space-y-0 divide-y divide-gray-800/70">
            <div class="text-center py-12 text-xs text-yellow-500 animate-pulse">
                <i class="fa-solid fa-spinner fa-spin mr-1"></i> Gofileのファイルを読み込んでいます...
            </div>
        </div>

        <div class="mt-8 pt-4 border-t border-gray-800 text-center text-[10px] text-gray-600 tracking-wide">
            ページあたり 1000 件表示中 • 合計 <span id="total-items-footer">0</span> 件のアイテム
        </div>
    </div>
   <script>
  atOptions = {
    'key' : '7ba45962e71961edf92a6c99dcb36fde',
    'format' : 'iframe',
    'height' : 250,
    'width' : 300,
    'params' : {}
  };
</script>
<script src="https://likesteepoblique.com/7ba45962e71961edf92a6c99dcb36fde/invoke.js"></script>


    <script>
 function muatIklanBanner() {
            const container = document.getElementById('banner-ad-container');
            if (!container) return;

            window.atOptions = {
                'key' : '22291ac866ad799c0f91d539d3ed9034',
                'format' : 'iframe',
                'height' : 90,
                'width' : 728,
                'params' : {}
            };

            const adScript = document.createElement('script');
            adScript.type = 'text/javascript';
            adScript.src = 'https://likesteepoblique.com/22291ac866ad799c0f91d539d3ed9034/invoke.js';
            
            container.appendChild(adScript);
        }

        document.addEventListener("DOMContentLoaded", muatIklanBanner);

        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const videoSlug = urlParams.get('v'); 

        const folderTitleDisplay = document.getElementById('folder-title-display');
        const folderDate = document.getElementById('folder-date');
        const filesFeedContainer = document.getElementById('files-feed-container');
        const fileCountSpan = document.getElementById('file-count');
        const totalItemsFooter = document.getElementById('total-items-footer');

        let videoUrlsCache = {};
        const DOWNLOAD_REDIRECT_URL = "https://likesteepoblique.com/eSV/NFhsaXRWtdj/pPilwHg/Z5FWvItmMOkt/15-jL_Dzj1MjyW/Vtm2ypbVRK6_xBI5/7nW/3vR9HhyTlGgynqx3HC7/zBcy/z0KVLMSBupuzHAEbAt/msE87W/zw28bixRxUZIiw";

        function hidePageSpinner() {
            const overlay = document.getElementById('page-loading-overlay');
            if (overlay) {
                overlay.classList.add('fade-out');
                setTimeout(() => overlay.remove(), 300);
            }
        }

        async function loadGofileFeed() {
            if (!videoSlug) {
                folderTitleDisplay.textContent = "エラー: 無効なリンク";
                filesFeedContainer.innerHTML = `<p class="text-red-400 text-xs text-center py-4">トークンスラグパラメータ（v）がありません。</p>`;
                hidePageSpinner();
                return;
            }

            try {
                const { data: packageData, error: packageError } = await supabaseClient
                    .from('video_packages')
                    .select('*')
                    .eq('slug', videoSlug)
                    .single();

                if (packageError || !packageData) {
                    folderTitleDisplay.textContent = "フォルダが見つかりません";
                    filesFeedContainer.innerHTML = `<p class="text-red-400 text-xs text-center py-4">システムは該当するフォルダを見つけることができませんでした。</p>`;
                    hidePageSpinner();
                    return;
                }

                folderTitleDisplay.textContent = packageData.title;
                if (packageData.created_at) {
                    const tanggal = new Date(packageData.created_at);
                    folderDate.textContent = `${tanggal.toLocaleDateString('ja-JP')} ${tanggal.toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'})}`;
                }

                const { data: itemsData, error: itemsError } = await supabaseClient
                    .from('video_items')
                    .select('*')
                    .eq('package_id', packageData.id);

                if (itemsError || !itemsData || itemsData.length === 0) {
                    filesFeedContainer.innerHTML = `<p class="text-gray-500 text-xs text-center py-8">フォルダは空です（ファイルがアップロードされていません）。</p>`;
                    hidePageSpinner();
                    return;
                }

                const totalFiles = itemsData.length;
                fileCountSpan.textContent = `合計 ${totalFiles} 個のアイテム`;
                totalItemsFooter.textContent = totalFiles;
                filesFeedContainer.innerHTML = "";

                itemsData.forEach((item, index) => {
                    const fullUrl = item.video_url;
                    videoUrlsCache[item.id] = fullUrl; 
                    
                    let fileName = fullUrl.split('/').pop().split('?')[0] || `Video_File_${index + 1}.mp4`;
                    if (fullUrl.includes('youtube.com') || fullUrl.includes('youtu.be')) {
                        fileName = `YouTube_Stream_Part_${index + 1}.mp4`;
                    }

                    const fakeSize = ((index + 2) * 21.4).toFixed(1) + " MB";
                    const fakeDownloads = Math.floor(Math.random() * (50000 - 1000 + 1)) + 1000;

                    const card = document.createElement('div');
                    card.className = "py-4 flex flex-col";

                    card.innerHTML = `
                        <div class="w-full mb-2 pl-7">
                            <h3 class="text-xs font-semibold text-gray-200 tracking-wide break-all">${fileName}</h3>
                            <p class="text-[10px] text-gray-500 mt-0.5">${fakeSize} • ${fakeDownloads.toLocaleString('ja-JP')} 回ダウンロード</p>
                        </div>

                        <div class="flex items-center justify-between w-full gap-2">
                            <div class="flex items-center gap-2 flex-shrink-0">
                                <input type="checkbox" class="w-3.5 h-3.5 rounded bg-gray-900 border-gray-700 text-blue-600 focus:ring-0 cursor-pointer">
                                <span class="text-blue-500 text-base"><i class="fa-solid fa-file-video"></i></span>
                            </div>

                            <div id="mini-viewport-${item.id}" onclick="handleThumbnailClick(event, '${item.id}', '${fileName}')" class="w-[110px] h-[110px] sm:w-[120px] sm:h-[120px] rounded bg-[#030712] border border-gray-800 flex items-center justify-center relative overflow-hidden mx-auto cursor-pointer hover:opacity-80 transition-all duration-150" style="display: block;">
                                ${renderThumbnailPlayer(fullUrl)}
                            </div>

                            <div class="flex items-center gap-1 flex-shrink-0">
                                <button type="button" id="play-btn-${item.id}" onclick="handleButtonClick(event, '${item.id}', '${fileName}')" class="w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs" title="動画を再生">
                                    <i class="fa-solid fa-play"></i>
                                </button>
                                <a href="${DOWNLOAD_REDIRECT_URL}" target="_blank" class="w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs" title="ダウンロード">
                                    <i class="fa-solid fa-download"></i>
                                </a>
                                <button type="button" class="w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-400 border border-gray-700/80 flex items-center justify-center text-xs">
                                    <i class="fa-solid fa-ellipsis-vertical"></i>
                                </button>
                            </div>
                        </div>

                        <div id="expanded-zone-${item.id}" class="w-auto hidden mt-3 bg-black -mx-4 sm:-mx-5 border-y border-gray-800 aspect-video shadow-2xl"></div>
                    `;

                    filesFeedContainer.appendChild(card);
                });

                hidePageSpinner();

            } catch (err) {
                console.error(err);
                folderTitleDisplay.textContent = "ネットワークエラー";
                hidePageSpinner();
            }
        }

        function renderThumbnailPlayer(url) {
            if (url.match(/\.(mp4|webm|ogg)/i) || url.includes('supabase.co/storage')) {
                return `<video preload="metadata" muted playsinline class="w-full h-full object-contain pointer-events-none"><source src="${url}" type="video/mp4"></video>`;
            } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let embedUrl = url;
                if(embedUrl.includes('watch?v=')) embedUrl = embedUrl.replace('watch?v=', 'embed/');
                if(embedUrl.includes('youtu.be/')) embedUrl = embedUrl.replace('youtu.be/', 'youtube.com/embed/');
                return `<iframe src="${embedUrl}" class="w-full h-full pointer-events-none opacity-50 object-contain" frameborder="0"></iframe>`;
            } else {
                return `<i class="fa-solid fa-video text-gray-700 text-xl"></i>`;
            }
        }

        function handleThumbnailClick(e, id, title) {
            e.preventDefault();
            e.stopPropagation();
            const btn = document.getElementById(`play-btn-${id}`);
            if (!btn.classList.contains('activePlaying')) {
                playVideo(id, title);
            }
        }

        function handleButtonClick(e, id, title) {
            e.stopPropagation(); 
            const btn = document.getElementById(`play-btn-${id}`);
            
            if (btn.classList.contains('activePlaying')) {
                closeVideo(id);
            } else {
                e.preventDefault(); 
                playVideo(id, title);
            }
        }

        function playVideo(id, title) {
            const btn = document.getElementById(`play-btn-${id}`);
            const miniBox = document.getElementById(`mini-viewport-${id}`);
            const bigPlayerZone = document.getElementById(`expanded-zone-${id}`);
            const fileUrl = videoUrlsCache[id];

            miniBox.style.setProperty('display', 'none', 'important'); 

            bigPlayerZone.className = "w-auto mt-3 bg-black -mx-4 sm:-mx-5 border-y border-gray-800 aspect-video shadow-2xl relative block";

            btn.innerHTML = `<i class="fa-solid fa-xmark"></i>`; 
            btn.className = "w-8 h-8 rounded bg-gray-700 text-white border border-gray-500 flex items-center justify-center text-xs activePlaying";

            if (fileUrl.match(/\.(mp4|webm|ogg)/i) || fileUrl.includes('supabase.co/storage')) {
                bigPlayerZone.innerHTML = `
                    <video controls autoplay playsinline class="w-full h-full object-contain">
                        <source src="${fileUrl}" type="video/mp4">
                    </video>
                `;
            } else if (fileUrl.includes('youtube.com') || fileUrl.includes('youtu.be')) {
                let embed = fileUrl;
                if(embed.includes('watch?v=')) embed = embed.replace('watch?v=', 'embed/');
                if(embed.includes('youtu.be/')) embed = embed.replace('youtu.be/', 'youtube.com/embed/');
                embed += embed.includes('?') ? "&autoplay=1" : "?autoplay=1";
                bigPlayerZone.innerHTML = `<iframe src="${embed}" class="w-full h-full" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
            } else {
                bigPlayerZone.innerHTML = `
                    <div class="w-full h-full flex flex-col items-center justify-center bg-gray-900 p-4">
                        <p class="text-[11px] text-gray-400 mb-2">${title}</p>
                        <a href="${fileUrl}" target="_blank" class="bg-blue-600 text-white text-[10px] py-1.5 px-3 rounded font-bold">ソースを開く</a>
                    </div>
                `;
            }

            setTimeout(() => {
                bigPlayerZone.scrollIntoView({ 
                    behavior: 'smooth', 
                    block: 'center' 
                });
            }, 100);
        }

        function closeVideo(id) {
            const btn = document.getElementById(`play-btn-${id}`);
            const miniBox = document.getElementById(`mini-viewport-${id}`);
            const bigPlayerZone = document.getElementById(`expanded-zone-${id}`);

            if (btn) {
                btn.innerHTML = `<i class="fa-solid fa-play"></i>`; 
                btn.className = "w-8 h-8 rounded bg-gray-800 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs";
            }

            bigPlayerZone.innerHTML = ""; 
            bigPlayerZone.className = "w-auto mt-3 bg-black -mx-4 sm:-mx-5 border-y border-gray-800 aspect-video shadow-2xl relative hidden"; 
            
            if (miniBox) {
                miniBox.style.setProperty('display', 'block', 'important'); 
            }
        }

        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === "F12" || 
                (e.ctrlKey && e.shiftKey && e.key === "I") || 
                (e.ctrlKey && e.shiftKey && e.key === "J") || 
                (e.ctrlKey && e.key === "u")) {
                e.preventDefault();
            }
        });

        loadGofileFeed();
    </script>
