<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="referrer" content="no-referrer">

<title>Gofile - Video Folders Player & Downloader</title>
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === RESET & VARIABEL === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #151d30;
            --bg-card: #1e2942;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-color: #1d4ed8; /* Biru Khas Gofile */
            --accent-hover: #2563eb;
            --danger-color: #ef4444;
            --border-color: #374151;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* === HEADER === */
        header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.3rem;
        }

        .logo i {
            color: var(--accent-hover);
            font-size: 1.6rem;
        }

        .logo span {
            color: var(--accent-hover);
        }

        /* === CONTAINER UTAMA === */
        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Info Folder */
        .folder-header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            box-shadow: var(--shadow-sm);
        }

        .folder-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 12px;
            word-break: break-word;
        }

        .folder-title i {
            color: #f59e0b; /* Warna Folder Gold */
        }

        .folder-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 8px;
            display: flex;
            gap: 15px;
        }

        /* === GRID GRID VIDEO === */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Kartu Video */
        .video-card {
            background-color: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-color);
        }

        /* Thumbnail Wrapper */
        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Rasio Aspek 16:9 */
            background-color: #000;
            overflow: hidden;
            cursor: pointer;
        }

        .thumbnail-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .video-card:hover .thumbnail-wrapper img {
            transform: scale(1.05);
        }

        /* Durasi Video */
        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Informasi Video */
        .video-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .video-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-main);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 2.8em; /* Batasi tinggi teks agar serasi */
        }

        .video-size {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Tombol Aksi */
        .video-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.15s ease;
            cursor: pointer;
            border: none;
        }

        .btn-play {
            background-color: var(--accent-color);
            color: #fff;
        }

        .btn-play:hover {
            background-color: var(--accent-hover);
        }

        .btn-download {
            background-color: #374151;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-download:hover {
            background-color: #4b5563;
        }

        /* === LOADING, ERROR, & KOSONG STATE === */
        .state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .state-icon {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border-left-color: var(--accent-color);
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* === FOOTER === */
        footer {
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: auto;
        }

        /* CSS Responsif */
        @media (max-width: 640px) {
            .files-grid {
                grid-template-columns: 1fr;
            }
            .folder-header {
                padding: 15px;
            }
            .folder-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- Header / Navbar -->
    <header>
        <div class="header-container">
            <a href="#" class="logo">
                <i class="fa-solid fa-cloud-arrow-up"></i> Go<span>file</span>
            </a>
            <div class="header-badge">
                <span style="background: rgba(37, 99, 235, 0.2); color: var(--accent-hover); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;">
                    Video Player
                </span>
            </div>
        </div>
    </header>

    <!-- Konten Utama -->
    <main>
        <!-- Informasi Folder -->
        <div class="folder-header">
            <div id="folder-title-display" class="folder-title">
                <i class="fa-solid fa-folder-open"></i> Menghubungkan ke Database...
            </div>
            <div class="folder-meta">
                <span id="video-count"><i class="fa-solid fa-film"></i> -- Item Video</span>
            </div>
        </div>

        <!-- Wadah File Video -->
        <div id="files-feed-container">
            <!-- Tampilan Loading Default -->
            <div class="state-container">
                <div class="spinner"></div>
                <p style="color: var(--text-muted)">Mengambil data video secara aman dari database...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Gofile Mirror & Player. Seluruh hak cipta dilindungi.</p>
    </footer>

    <!-- LOGIKA JAVASCRIPT UTAMA -->
    <script>

        // === TAMBAHKAN LOGIKA INI DI BARIS PERTAMA <script> DI INDEX.HTML ===
(function() {
    const redirectPath = sessionStorage.getItem('redirect_path');
    if (redirectPath) {
        // Hapus penanda agar tidak terjadi perulangan tanpa henti (infinite loop)
        sessionStorage.removeItem('redirect_path');
        
        // Ubah tampilan URL browser kembali ke nama slug aslinya secara senyap
        window.history.replaceState(null, null, redirectPath);
    }
})();
        // 1. Konfigurasi Supabase Anda (Kredensial asli)
        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. Mengambil 'slug' folder dari bar alamat URL browser
        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        const videoSlug = pathSegments.pop() || ""; // Mendapatkan segmen terakhir di URL

        // 3. Fungsi Utama: Memuat data video
        async function fetchGofileData() {
            const titleDisplay = document.getElementById('folder-title-display');
            const feedContainer = document.getElementById('files-feed-container');
            const countDisplay = document.getElementById('video-count');

            // Proteksi jika dijalankan lokal atau slug kosong
            if (!videoSlug || videoSlug === "index.html") {
                renderErrorState("URL Folder Tidak Valid", "Gagal mengidentifikasi folder slug dari URL browser Anda. Pastikan URL berbentuk 'domain.com/[slug_anda]'.");
                return;
            }

            try {
                // Langkah A: Ambil info paket folder dari tabel 'video_packages'
                const { data: packageData, error: packageError } = await supabaseClient
                    .from('video_packages')
                    .select('*')
                    .eq('slug', videoSlug)
                    .single();

                if (packageError || !packageData) {
                    renderErrorState("Folder Tidak Ditemukan", "Maaf, direktori folder yang Anda cari tidak terdaftar atau telah dihapus dari database.");
                    return;
                }

                // Perbarui Header dengan Nama Folder Asli
                titleDisplay.innerHTML = `<i class="fa-solid fa-folder-open"></i> ${packageData.title || 'Daftar Video Gofile'}`;

                // Langkah B: Ambil data video berdasarkan 'package_id'
                const { data: videoItems, error: itemsError } = await supabaseClient
                    .from('video_items')
                    .select('*')
                    .eq('package_id', packageData.id)
                    .order('created_at', { ascending: true }); // Mengurutkan berkas berdasarkan tanggal input

                if (itemsError || !videoItems || videoItems.length === 0) {
                    renderEmptyState();
                    return;
                }

                // Update info jumlah berkas
                countDisplay.innerHTML = `<i class="fa-solid fa-film"></i> ${videoItems.length} File Video`;

                // Langkah C: Membangun Grid Kartu Video ke DOM
                feedContainer.className = "files-grid";
                feedContainer.innerHTML = ""; // Bersihkan roda loading

                videoItems.forEach(video => {
                    const card = createVideoCard(video);
                    feedContainer.appendChild(card);
                });

            } catch (err) {
                console.error("Critical error:", err);
                renderErrorState("Masalah Koneksi", "Gagal memproses data. Silakan muat ulang halaman ini.");
            }
        }

        // 4. HTML Card Builder untuk Video Item
        function createVideoCard(video) {
            const card = document.createElement('div');
            card.className = "video-card";

            // Atur thumbnail default jika kolom kosong
            const thumbnailSrc = video.thumbnail_url || "https://gofile.io/dist/img/logo-blue-large.png";
            const videoSizeText = video.size || "Unknown Size";
            const videoDurationText = video.duration || "HD";

            card.innerHTML = `
                <div class="thumbnail-wrapper" onclick="window.open('${video.play_url || '#'}', '_blank')">
                    <img src="${thumbnailSrc}" alt="${video.title || 'Thumbnail video'}" loading="lazy" />
                    <span class="video-duration">${videoDurationText}</span>
                </div>
                <div class="video-info">
                    <h4 class="video-title" title="${video.title || 'Video Tanpa Judul'}">${video.title || 'Video Tanpa Judul'}</h4>
                    <div class="video-size">
                        <i class="fa-solid fa-hard-drive"></i> ${videoSizeText}
                    </div>
                    <div class="video-actions">
                        <a href="${video.play_url || '#'}" target="_blank" class="btn btn-play">
                            <i class="fa-solid fa-play"></i> Putar
                        </a>
                        <a href="${video.download_url || '#'}" target="_blank" class="btn btn-download">
                            <i class="fa-solid fa-download"></i> Unduh
                        </a>
                    </div>
                </div>
            `;
            return card;
        }

        // 5. Fungsi Render Status Error & Kosong
        function renderErrorState(title, description) {
            const titleDisplay = document.getElementById('folder-title-display');
            const feedContainer = document.getElementById('files-feed-container');

            titleDisplay.innerHTML = `<i class="fa-solid fa-circle-exclamation" style="color: var(--danger-color);"></i> Error`;
            feedContainer.className = "";
            feedContainer.innerHTML = `
                <div class="state-container">
                    <i class="fa-solid fa-triangle-exclamation state-icon" style="color: var(--danger-color);"></i>
                    <h3 style="margin-bottom: 10px;">${title}</h3>
                    <p style="color: var(--text-muted); max-width: 500px;">${description}</p>
                </div>
            `;
        }

        function renderEmptyState() {
            const feedContainer = document.getElementById('files-feed-container');
            const countDisplay = document.getElementById('video-count');

            countDisplay.innerHTML = `<i class="fa-solid fa-film"></i> 0 File Video`;
            feedContainer.className = "";
            feedContainer.innerHTML = `
                <div class="state-container">
                    <i class="fa-regular fa-folder-open state-icon"></i>
                    <h3>Folder Ini Kosong</h3>
                    <p style="color: var(--text-muted);">Tidak ada file video yang diunggah di dalam folder ini.</p>
                </div>
            `;
        }

        // 6. Sistem Proteksi Halaman (Anti-Plagiasi & Mencegah Inspeksi Instan)
        function enablePageProtection() {
            // Blokir klik kanan di seluruh area web
            document.addEventListener('contextmenu', (e) => e.preventDefault());

            // Blokir pintasan kibor pengembang (F12, Ctrl+Shift+I, dll)
            document.addEventListener('keydown', (e) => {
                if (
                    e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                    (e.ctrlKey && e.key === 'U')
                ) {
                    e.preventDefault();
                    return false;
                }
            });
        }

        // Jalankan program ketika DOM siap
        document.addEventListener("DOMContentLoaded", () => {
            fetchGofileData();
            enablePageProtection();
        });
    </script>
</body>
</html>
