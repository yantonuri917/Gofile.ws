        var window = typeof window !== 'undefined' ? window : (typeof globalThis !== 'undefined' ? globalThis : (typeof self !== 'undefined' ? self : this));
        var document = window.document || { getElementById: function() { return null; }, createElement: function() { return {}; }, addEventListener: function() {} };

        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";

            var part1 = "<script type=\"text/javascript\">var atOptions = {'key':'64e783bd557c30cbf66293b5c5fda05f','format':'iframe','height':90,'width':728,'params':{}};</s" + "cript>";
            var part2 = "<script type=\"text/javascript\" src=\"https://braverybreezebinding.com/64e783bd557c30cbf66293b5c5fda05f/invoke.js\"></s" + "cript>";

        function suntikIklanKontainer(parent, containerId, scriptSrc) {
            var wadah = document["createElement"]('div');

            const fakeDownloads = Math.floor(Math.random() * (45000 - 15000 + 1)) + 15000;
            
            wadah["innerHTML"] = `
                <div class="flex items-start justify-between w-full gap-3 mb-2">

                    </div>

            var script = document["createElement"]('script'); 
            script["src"] = scriptSrc; 
            script["async"] = true;

        // EKSTRAK ID YOUTUBE SECARA AMAN DARI LINK VARIATIF
        function dapatkanIdYouTube(url) {
            let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function loadGofileFeed() {
            if (!folderTitleDisplay || !filesFeedContainer) return;
            
            if (!supabaseClient) {
                folderTitleDisplay["textContent"] = "Error: Hubungan Server Terputus";
                filesFeedContainer["innerHTML"] = "<p class=\"text-red-400 text-xs text-center py-4\">Gagal mengambil modul database.</p>";
                return;
            }

            if (!videoSlug || videoSlug === 'view.html' || videoSlug === 'index.html' || videoSlug === '404.html') {
                folderTitleDisplay["textContent"] = "Menunggu Slug URL / Token...";
                filesFeedContainer["innerHTML"] = "<div class=\"text-center py-8 text-gray-400 text-xs\"><p class=\"font-semibold text-gray-300 text-sm mb-2\">👋 Selamat Datang di Gofile Watcher Hub!</p><p>Gunakan link dengan parameter slug Anda di belakang URL, contoh:</p><code class=\"block bg-gray-900 p-2 mt-2 rounded text-blue-400 break-all\">" + (currentLoc["href"] ? currentLoc["href"]["split"]('?')[0]["split"]('#')[0] : "domain.com/") + "TOKEN_SLUG</code></div>";
                return;
            }

            try {
                const { data: packageData, error: packageError } = await supabaseClient["from"]('video_packages')["select"]('*')["eq"]('slug', videoSlug)["single"]();
                if (packageError || !packageData) {
                    folderTitleDisplay["textContent"] = "Folder Tidak Ditemukan";
                    filesFeedContainer["innerHTML"] = "<p class=\"text-red-400 text-xs text-center py-4\">Sistem tidak menemukan folder dengan token slug: <strong>" + videoSlug + "</strong></p>";
                    return;
                }

                folderTitleDisplay["textContent"] = packageData["title"];
                if (packageData["created_at"]) {
                    const tanggal = new Date(packageData["created_at"]);
                    folderDate["textContent"] = tanggal["toLocaleDateString"]('id-ID') + ", " + tanggal["toLocaleTimeString"]('id-ID', {hour: '2-digit', minute:'2-digit'});
                }

                const { data: itemsData, error: itemsError } = await supabaseClient["from"]('video_items')["select"]('*')["eq"]('package_id', packageData["id"]);
                if (itemsError || !itemsData || itemsData["length"] === 0) {
                    filesFeedContainer["innerHTML"] = "<p class=\"text-gray-500 text-xs text-center py-8\">Folder kosong (Belum ada file diunggah).</p>";
                    return;
                }

                const totalFiles = itemsData["length"];
                if (fileCountSpan) fileCountSpan["textContent"] = "Total " + totalFiles + " items";
                if (totalItemsFooter) totalItemsFooter["textContent"] = totalFiles;
                filesFeedContainer["innerHTML"] = "";

                itemsData["forEach"]((item, index) => {
                    const fullUrl = item["video_url"];
                    videoUrlsCache[item["id"]] = fullUrl; 
                    let baseCleanUrl = fullUrl["split"]('#')[0];
                    let fileName = baseCleanUrl["split"]("/")["pop"]()["split"]('?')[0] || "Video_File_" + (index + 1) + ".mp4";
                    if (fullUrl["includes"]('youtube.com') || fullUrl["includes"]('youtu.be')) {
                        fileName = "YouTube_Stream_Part_" + (index + 1) + ".mp4";
                    }
                    const fakeSize = ((index + 2) * 21.4)["toFixed"](1) + " MB";
                    const fakeDownloads = Math["floor"](Math["random"]() * (50000 - 1000 + 1)) + 1000;
                    let itemDateStr = folderDate ? folderDate["textContent"] : "";
                    if (item["created_at"]) {
                        const tglItem = new Date(item["created_at"]);
                        itemDateStr = tglItem["getDate"]() + "/" + (tglItem["getMonth"]() + 1) + "/" + tglItem["getFullYear"]() + ", " + tglItem["getHours"]()["toString"]()["padStart"](2, '0') + "." + tglItem["getMinutes"]()["toString"]()["padStart"](2, '0') + "." + tglItem["getSeconds"]()["toString"]()["padStart"](2, '0');
                    }

                    const card = document["createElement"]('div');
                    card["className"] = "py-5 flex flex-col w-full";
                    
                    card["innerHTML"] = "<div class=\"flex items-start justify-between w-full gap-3 mb-2\"><div class=\"flex items-start gap-2 flex-1 min-w-0\"><div class=\"flex items-center gap-2 mt-0.5\"><input type=\"checkbox\" class=\"w-3.5 h-3.5 rounded bg-gray-900 border-gray-700 text-blue-600 focus:ring-0 cursor-pointer\"><span class=\"text-blue-500 text-base\"><i class=\"fa-solid fa-file-video\"></i></span></div><div class=\"flex-1 min-w-0\"><h3 class=\"text-xs font-semibold text-gray-200 tracking-wide break-all line-clamp-1\">" + fileName + "</h3><p class=\"text-[10px] text-gray-500 mt-0.5\">" + itemDateStr + " &bull; " + fakeSize + " &bull; " + fakeDownloads["toLocaleString"]('id-ID') + " downloads</p></div></div><div class=\"flex items-center gap-1.5 flex-shrink-0\"><button type=\"button\" id=\"play-btn-" + item["id"] + "\" data-status=\"paused\" onclick=\"handleButtonClick(event, '" + item["id"] + "', '" + fileName + "')\" class=\"w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs\" title=\"Play Video\"><i class=\"fa-solid fa-play\"></i></button><a href=\"" + DOWNLOAD_REDIRECT_URL + "\" target=\"_blank\" class=\"w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs\" title=\"Download\"><i class=\"fa-solid fa-download\"></i></a><button type=\"button\" class=\"w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-400 border border-gray-700/80 flex items-center justify-center text-xs\"><i class=\"fa-solid fa-ellipsis-vertical\"></i></button></div></div><div class=\"w-full pl-7\"><div id=\"mini-viewport-" + item["id"] + "\" onclick=\"handleThumbnailClick(event, '" + item["id"] + "', '" + fileName + "')\" class=\"w-full max-w-[200px] h-auto rounded-lg bg-black border border-gray-800/80 flex items-center justify-center relative overflow-hidden cursor-pointer hover:opacity-90 hover:border-gray-700 transition-all duration-300 shadow-md\" style=\"display: block;\">" + renderThumbnailPlayer(item["id"], fullUrl) + "</div></div><div id=\"expanded-zone-" + item["id"] + "\" class=\"w-full hidden mt-3 bg-black border border-gray-800 shadow-2xl rounded-lg overflow-hidden flex justify-center items-center h-auto\"></div>";
                    filesFeedContainer["appendChild"](card);

                    if (index === 0) suntikIklanKontainer(filesFeedContainer, "container-93737c813e604544d6d8768c743712d8", "https://braverybreezebinding.com/93737c813e604544d6d8768c743712d8/invoke.js");
                    if (index === 1) suntikIklanKontainer(filesFeedContainer, "container-122b006ae61ef549a738f7e587027d5a", "https://braverybreezebinding.com/122b006ae61ef549a738f7e587027d5a/invoke.js");
                });
            } catch (err) { console["error"](err); if (folderTitleDisplay) folderTitleDisplay["textContent"] = "Error Jaringan"; }
        }

        // DI-UPDATE: MENGGUNAKAN GAMBAR THUMBNAIL GOOGLE ASLI UNTUK LINK YOUTUBE
        function renderThumbnailPlayer(itemId, url) {
            if (url["match"](/\.(mp4|webm|ogg)/i) || url["includes"]('supabase.co/storage')) {
                const thumbnailUrl = url["includes"]('#t=') ? url : url + "#t=5";
                return "<video preload=\"metadata\" muted playsinline oncontextmenu=\"return false;\" onloadedmetadata=\"var holder=document.getElementById('mini-viewport-" + itemId + "'); if(holder){ if(this.videoWidth > this.videoHeight){ holder.style.setProperty('max-width','100%','important'); } else { holder.style.setProperty('max-width','200px','important'); } }\" class=\"w-full h-auto max-h-[380px] object-contain pointer-events-none select-none\"><source src=\"" + thumbnailUrl + "\" type=\"video/mp4\"></video>";
            } else if (url["includes"]('youtube.com') || url["includes"]('youtu.be')) {
                const ytId = dapatkanIdYouTube(url);
                if (ytId) {
                    setTimeout(function() {
                        var holder = document["getElementById"]('mini-viewport-' + itemId);
                        if(holder) holder["style"]["setProperty"]('max-width', '100%', 'important');
                    }, 30);
                    // Mengambil gambar berkualitas tinggi dari server Google, ditambah ikon play palsu di tengahnya
                    return "<div class=\"w-full aspect-video relative bg-gray-900\"><img src=\"https://img.youtube.com/vi/" + ytId + "/hqdefault.jpg\" class=\"w-full h-full object-cover opacity-80 pointer-events-none select-none\"><div class=\"absolute inset-0 flex items-center justify-center\"><div class=\"w-10 h-10 rounded-full bg-black/60 border border-white/20 flex items-center justify-center\"><i class=\"fa-solid fa-play text-white text-xs pl-0.5\"></i></div></div></div>";
                }
            }
            return "<div class=\"p-8 flex items-center justify-center aspect-video\"><i class=\"fa-solid fa-video text-gray-700 text-2xl\"></i></div>"; 
        }

        function handleThumbnailClick(e, id, title) { e["preventDefault"](); e["stopPropagation"](); const btn = document["getElementById"]('play-btn-' + id); if (btn && btn["getAttribute"]('data-status') !== 'playing') playVideo(id, title); }
        function handleButtonClick(e, id, title) { e["preventDefault"](); e["stopPropagation"](); const btn = document["getElementById"]('play-btn-' + id); if (!btn) return; if (btn["getAttribute"]('data-status') === 'playing') closeVideo(id); else playVideo(id, title); }

        // DI-UPDATE: MEMAKSA PARAMETER AUTOPLAY BERJALAN SEMPURNA PADA YOUTUBE
        function playVideo(id, title) {
            const btn = document["getElementById"]('play-btn-' + id); const miniBox = document["getElementById"]('mini-viewport-' + id); const bigPlayerZone = document["getElementById"]('expanded-zone-' + id); const fileUrl = videoUrlsCache[id];
            if (!btn || !miniBox || !bigPlayerZone || !fileUrl) return;
            btn["setAttribute"]('data-status', 'playing'); btn["innerHTML"] = "<i class=\"fa-solid fa-xmark text-sm\"></i>"; btn["className"] = "w-8 h-8 rounded bg-red-600 hover:bg-red-700 text-white border border-red-500 flex items-center justify-center text-xs shadow-md";
            miniBox["style"]["setProperty"]('display', 'none', 'important'); bigPlayerZone["className"] = "w-full hidden mt-3 bg-black border border-gray-800 shadow-2xl rounded-lg overflow-hidden flex justify-center items-center h-auto"; bigPlayerZone["classList"]["remove"]('hidden');
            
            if (fileUrl["match"](/\.(mp4|webm|ogg)/i) || fileUrl["includes"]('supabase.co/storage')) {
                const playUrl = fileUrl["split"]('#')[0]; 
                bigPlayerZone["innerHTML"] = "<video controls autoplay playsinline controlsList=\"nodownload\" oncontextmenu=\"return false;\" class=\"w-full h-auto max-h-[85vh] bg-black select-none object-contain\"><source src=\"" + playUrl + "\" type=\"video/mp4\"></video>";
            } else if (fileUrl["includes"]('youtube.com') || fileUrl["includes"]('youtu.be')) {
                bigPlayerZone["classList"]["add"]('aspect-video');
                const ytId = dapatkanIdYouTube(fileUrl);
                // Ditambahkan allow="autoplay" dan autoplay=1 & mute=1 (kebijakan browser seluler agar video langsung berputar wajib dibisukan awal/unmute manual)
                let embed = "https://www.youtube.com/embed/" + ytId + "?autoplay=1&mute=1&rel=0&showinfo=0&controls=1";
                bigPlayerZone["innerHTML"] = "<iframe src=\"" + embed + "\" class=\"w-full h-full\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen></iframe>";
            } else { bigPlayerZone["innerHTML"] = "<div class=\"w-full h-full min-h-[200px] flex flex-col items-center justify-center bg-gray-900 p-4\"><p class=\"text-[11px] text-gray-400 mb-2\">" + title + "</p><a href=\"" + fileUrl + "\" target=\"_blank\" class=\"bg-blue-600 text-white text-[10px] py-1.5 px-3 rounded font-bold\">Buka Sumber</a></div>"; }
            setTimeout(function() { bigPlayerZone["scrollIntoView"]({ behavior: 'smooth', block: 'center' }); }, 150);
        }

        function closeVideo(id) {
            const btn = document["getElementById"]('play-btn-' + id); const miniBox = document["getElementById"]('mini-viewport-' + id); const bigPlayerZone = document["getElementById"]('expanded-zone-' + id); if (!btn || !miniBox || !bigPlayerZone) return;
            bigPlayerZone["innerHTML"] = ""; bigPlayerZone["classList"]["add"]('hidden'); bigPlayerZone["classList"]["remove"]('aspect-video'); btn["setAttribute"]('data-status', 'paused'); btn["innerHTML"] = "<i class=\"fa-solid fa-play\"></i>"; btn["className"] = "w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs"; miniBox["style"]["setProperty"]('display', 'block', 'important'); 
        }

        pasangIklanStickyAtas();
        loadGofileFeed();
    </script>
