<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gofile - Mengarahkan...</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border-left-color: #1d4ed8;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Ambil path URL yang memicu error 404 (misalnya: /slug-video-anda)
        const currentPath = window.location.pathname;

        // Simpan path tersebut ke sessionStorage agar bisa dibaca di index.html
        sessionStorage.setItem('redirect_path', currentPath);

        // Arahkan browser kembali ke halaman utama (index.html) tanpa merusak history
        window.location.replace('/');
    </script>
</head>
<body>
    <div class="spinner"></div>
    <p>Menyiapkan video...</p>
</body>
</html>
