<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gofile - Redirecting...</title>
    <script type="text/javascript">
        // Jalankan perutean khusus untuk GitHub Pages (Mendukung /slug dan /d/slug)
        var l = window.location;
        var path = l.pathname; 
        
        // Bersihkan tanda garing di awal dan di akhir path
        var cleanPath = path.replace(/^\/|\/$/g, '');
        
        // Jika polanya diawali dengan 'd/', buang prefix 'd/' untuk mengambil slug murninya
        if (cleanPath.startsWith('d/')) {
            cleanPath = cleanPath.substring(2);
        }

        // Alihkan kembali ke halaman utama index.html dengan membawa parameter rahasia '?p=slug'
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            '/?p=' + encodeURIComponent(cleanPath) +
            l.search.replace(/&/g, '~and~') +
            l.hash
        );
    </script>
</head>
<body>
    <p>Memuat halaman...</p>
</body>
</html>
